<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — VibeDesign</title>
  <style>
    :root {
      --font-ui: "SF Pro Display", "Hiragino Sans", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-ui);
      background: #0A0A0A;
      color: #FFFFFF;
      overflow: hidden;
      height: 100vh;
    }

    /* Embed mode: no chrome, just the sample page */
    body.embed-mode { overflow: auto; background: transparent; }
    body.embed-mode .toolbar { display: none; }
    body.embed-mode .main { height: 100vh; }
    body.embed-mode .side-panel { display: none; }
    body.embed-mode .preview-container { padding: 0; }
    body.embed-mode .preview-wrapper { border-radius: 0; max-width: 100%; width: 100%; height: 100%; box-shadow: none; }
    body.embed-mode .preview-browser-bar { display: none; }
    body.embed-mode .preview-content { height: 100%; }

    /* ============================================
       Top Toolbar
       ============================================ */
    .toolbar {
      height: 56px;
      background: #111111;
      border-bottom: 1px solid #222222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .toolbar-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .toolbar-back:hover { color: #FFF; }

    .toolbar-title {
      font-size: 14px;
      font-weight: 600;
      color: #EEE;
    }

    .toolbar-center {
      display: flex;
      gap: 4px;
      background: #1A1A1A;
      border-radius: 8px;
      padding: 3px;
    }

    .view-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.2s;
    }
    .view-btn.active {
      background: #333;
      color: #FFF;
    }
    .view-btn:hover:not(.active) { color: #CCC; }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-btn-secondary {
      background: #222;
      color: #EEE;
      border: 1px solid #333;
    }
    .toolbar-btn-secondary:hover { background: #333; }

    .toolbar-btn-primary {
      background: #0071E3;
      color: #FFF;
    }
    .toolbar-btn-primary:hover { background: #0077ED; }

    /* ============================================
       Main Layout
       ============================================ */
    .main {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ============================================
       Preview Frame
       ============================================ */
    .preview-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
    }

    .preview-wrapper {
      background: #FFF;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transition: all 0.4s ease;
      position: relative;
    }

    .preview-wrapper.desktop { width: 100%; max-width: 1200px; height: 100%; }
    .preview-wrapper.tablet { width: 768px; height: 100%; }
    .preview-wrapper.mobile { width: 375px; height: 100%; }

    .preview-browser-bar {
      height: 36px;
      background: var(--p-surface, #F5F5F5);
      border-bottom: 1px solid var(--p-border, #E0E0E0);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .pb-dot { width: 10px; height: 10px; border-radius: 50%; }
    .pb-dot-r { background: #FF5F57; }
    .pb-dot-y { background: #FEBC2E; }
    .pb-dot-g { background: #28C840; }

    .pb-url {
      flex: 1;
      margin-left: 8px;
      height: 22px;
      background: var(--p-bg, #FFFFFF);
      border-radius: 4px;
      padding: 0 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--p-muted, #999);
      display: flex;
      align-items: center;
    }

    .preview-content {
      height: calc(100% - 36px);
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    /* ============================================
       Sample Page Styles (dynamic via CSS vars)
       ============================================ */
    .sample {
      background: var(--p-bg);
      color: var(--p-text);
      font-family: var(--p-font);
      min-height: 100%;
    }

    .sample-nav {
      height: var(--p-nav-h, 64px);
      background: var(--p-bg);
      border-bottom: 1px solid var(--p-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .sample-nav-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--p-text);
    }

    .sample-nav-links {
      display: flex;
      gap: 24px;
    }

    .sample-nav-links span {
      font-size: 14px;
      color: var(--p-muted);
    }

    .sample-hero {
      text-align: center;
      padding: 100px 40px 80px;
      background: var(--p-hero-bg, var(--p-bg));
    }

    .sample-hero-label {
      font-size: 14px;
      color: var(--p-primary);
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sample-hero h1 {
      font-size: var(--p-h1-size, 48px);
      font-weight: var(--p-h1-weight, 700);
      line-height: 1.1;
      color: var(--p-hero-text, var(--p-text));
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .sample-hero p {
      font-size: 18px;
      color: var(--p-hero-muted, var(--p-muted));
      max-width: 500px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }

    .sample-btn {
      display: inline-block;
      padding: var(--p-btn-pad, 14px 32px);
      background: var(--p-primary);
      color: var(--p-btn-text, #FFFFFF);
      border-radius: var(--p-btn-radius, 8px);
      font-size: 16px;
      font-weight: var(--p-btn-weight, 600);
      text-decoration: none;
      border: none;
      font-family: var(--p-font);
      letter-spacing: var(--p-btn-ls, 0);
      text-transform: var(--p-btn-tt, none);
    }

    .sample-btn-secondary {
      background: transparent;
      border: 1px solid var(--p-border);
      color: var(--p-text);
      margin-left: 12px;
    }

    .sample-section {
      padding: 80px 40px;
    }

    .sample-section-surface {
      background: var(--p-surface);
    }

    .sample-section-title {
      font-size: var(--p-h2-size, 36px);
      font-weight: var(--p-h2-weight, 600);
      text-align: center;
      margin-bottom: 12px;
      color: var(--p-text);
    }

    .sample-section-sub {
      font-size: 16px;
      color: var(--p-muted);
      text-align: center;
      margin-bottom: 48px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .sample-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .sample-card {
      background: var(--p-card-bg, var(--p-bg));
      border-radius: var(--p-card-radius, 12px);
      padding: var(--p-card-pad, 28px);
      border: 1px solid var(--p-border);
    }

    .sample-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--p-primary);
      opacity: 0.15;
      margin-bottom: 16px;
      position: relative;
    }
    .sample-card-icon::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: var(--p-primary);
    }

    .sample-card h3 {
      font-size: var(--p-h3-size, 20px);
      font-weight: var(--p-h3-weight, 600);
      margin-bottom: 8px;
      color: var(--p-text);
    }

    .sample-card p {
      font-size: 14px;
      color: var(--p-muted);
      line-height: 1.6;
    }

    .sample-cta {
      text-align: center;
      padding: 100px 40px;
      background: var(--p-cta-bg, var(--p-surface));
    }

    .sample-cta h2 {
      font-size: var(--p-h2-size, 36px);
      font-weight: var(--p-h2-weight, 700);
      margin-bottom: 16px;
      color: var(--p-text);
    }

    .sample-cta p {
      font-size: 16px;
      color: var(--p-muted);
      margin-bottom: 32px;
    }

    .sample-footer {
      padding: 32px 40px;
      border-top: 1px solid var(--p-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--p-muted);
      background: var(--p-bg);
    }

    .sample-footer-links {
      display: flex;
      gap: 20px;
    }

    .sample-footer-links span {
      color: var(--p-muted);
    }

    /* ============================================
       Side Panel — Design Tokens
       ============================================ */
    .side-panel {
      width: 320px;
      background: #111;
      border-left: 1px solid #222;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 20px;
    }

    .panel-section {
      margin-bottom: 24px;
    }

    .panel-section-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .token-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #1A1A1A;
    }

    .token-label {
      font-size: 12px;
      color: #888;
    }

    .token-value {
      font-size: 12px;
      font-family: var(--font-mono);
      color: #CCC;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .token-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .panel-vibe {
      font-size: 13px;
      color: #999;
      line-height: 1.6;
      padding: 12px;
      background: #1A1A1A;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .panel-name {
      font-size: 16px;
      font-weight: 600;
      color: #EEE;
      margin-bottom: 6px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 15px;
      color: #666;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .side-panel { display: none; }
      .toolbar-center { display: none; }
      .sample-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <a href="gallery.html" class="toolbar-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Gallery
      </a>
      <span class="toolbar-title" id="toolbarTitle">Loading...</span>
    </div>
    <div class="toolbar-center">
      <button class="view-btn active" data-view="desktop">Desktop</button>
      <button class="view-btn" data-view="tablet">Tablet</button>
      <button class="view-btn" data-view="mobile">Mobile</button>
    </div>
    <div class="toolbar-right">
      <a href="#" class="toolbar-btn toolbar-btn-secondary" id="downloadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download .md
      </a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Preview -->
    <div class="preview-container">
      <div class="preview-wrapper desktop" id="previewWrapper">
        <div class="preview-browser-bar">
          <span class="pb-dot pb-dot-r"></span>
          <span class="pb-dot pb-dot-y"></span>
          <span class="pb-dot pb-dot-g"></span>
          <div class="pb-url" id="previewUrl">loading...</div>
        </div>
        <div class="preview-content" id="previewContent">
          <div class="loading">Loading preview...</div>
        </div>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel" id="sidePanel">
      <div class="loading">Loading tokens...</div>
    </div>
  </div>

  <script>
    // Get template ID from URL
    const params = new URLSearchParams(window.location.search);
    const templateId = params.get('id') || '01-stripe';

    // Template metadata
    const meta = {
      '01-stripe': { name: 'Stripe', url: 'stripe.com' },
      '02-linear': { name: 'Linear', url: 'linear.app' },
      '03-notion': { name: 'Notion', url: 'notion.so' },
      '04-vercel': { name: 'Vercel', url: 'vercel.com' },
      '05-spotify': { name: 'Spotify', url: 'spotify.com' },
      '06-airbnb': { name: 'Airbnb', url: 'airbnb.com' },
      '07-dribbble': { name: 'Dribbble', url: 'dribbble.com' },
      '08-figma': { name: 'Figma', url: 'figma.com' },
      '09-github': { name: 'GitHub', url: 'github.com' },
      '10-monopo': { name: 'monopo', url: 'monopo.london' },
      '11-muji': { name: 'MUJI', url: 'muji.com' },
      '12-awwwards': { name: 'Awwwards', url: 'awwwards.com' },
      '13-arc': { name: 'Arc', url: 'arc.net' },
      '14-raycast': { name: 'Raycast', url: 'raycast.com' },
      '15-framer': { name: 'Framer', url: 'framer.com' },
      '16-supabase': { name: 'Supabase', url: 'supabase.com' },
      '17-aesop': { name: 'Aesop', url: 'aesop.com' },
      '18-medium': { name: 'Medium', url: 'medium.com' },
      '19-twitch': { name: 'Twitch', url: 'twitch.tv' },
      '20-wise': { name: 'Wise', url: 'wise.com' }
    };

    // Parse design.md to extract values
    function parseDesignMd(text) {
      const tokens = {};

      // Color extraction
      const colorMap = {
        'Primary': 'primary', 'Secondary': 'secondary', 'Background': 'bg',
        'Surface': 'surface', 'Text': 'text', 'Text-muted': 'muted',
        'Accent': 'accent', 'Border': 'border'
      };

      for (const [label, key] of Object.entries(colorMap)) {
        // Match pattern like "Primary:      #635BFF"
        const re = new RegExp(`^${label.replace('-', '\\-')}:\\s+(#[A-Fa-f0-9]{6})`, 'm');
        const m = text.match(re);
        if (m) tokens[key] = m[1];
      }

      // Font extraction
      const fontMatch = text.match(/Font:\s+"([^"]+)"/);
      if (fontMatch) tokens.font = fontMatch[1];

      const fontEnMatch = text.match(/Font-en:\s+"([^"]+)"/);
      if (fontEnMatch) tokens.fontEn = fontEnMatch[1];

      // Base size
      const baseMatch = text.match(/Base size:\s+(\d+)px/);
      if (baseMatch) tokens.baseSize = baseMatch[1] + 'px';

      // Line height
      const lhMatch = text.match(/Line height:\s+([\d.]+)/);
      if (lhMatch) tokens.lineHeight = lhMatch[1];

      // Letter spacing
      const lsMatch = text.match(/Letter spacing:\s*(-?[\d.]+em)/);
      if (lsMatch) tokens.letterSpacing = lsMatch[1];

      // Heading sizes
      const h1Match = text.match(/H1:.*?(\d+)px/);
      if (h1Match) tokens.h1Size = h1Match[1] + 'px';
      const h2Match = text.match(/H2:.*?(\d+)px/);
      if (h2Match) tokens.h2Size = h2Match[1] + 'px';
      const h3Match = text.match(/H3:.*?(\d+)px/);
      if (h3Match) tokens.h3Size = h3Match[1] + 'px';

      // Heading weights
      const h1wMatch = text.match(/H1:.*?(\d{3})/);
      if (h1wMatch) tokens.h1Weight = h1wMatch[1];
      const h2wMatch = text.match(/H2:.*?(\d{3})/);
      if (h2wMatch) tokens.h2Weight = h2wMatch[1];

      // Button radius
      const brMatch = text.match(/### Button[\s\S]*?Border radius:\s+(\d+)px/);
      if (brMatch) tokens.btnRadius = brMatch[1] + 'px';
      // Pill shape
      if (text.match(/Border radius:\s+500px|Border radius:\s+980px/)) {
        tokens.btnRadius = '980px';
      }

      // Button padding
      const bpMatch = text.match(/### Button[\s\S]*?Padding:\s+([\d]+px\s+[\d]+px)/);
      if (bpMatch) tokens.btnPad = bpMatch[1];

      // Card radius
      const crMatch = text.match(/### Card[\s\S]*?Border radius:\s+(\d+)px/);
      if (crMatch) tokens.cardRadius = crMatch[1] + 'px';

      // Card padding
      const cpMatch = text.match(/### Card[\s\S]*?Padding:\s+(\d+)px/);
      if (cpMatch) tokens.cardPad = cpMatch[1] + 'px';

      // Nav height
      const nhMatch = text.match(/### Navigation[\s\S]*?Height:\s+(\d+)px/);
      if (nhMatch) tokens.navHeight = nhMatch[1] + 'px';

      // Max width
      const mwMatch = text.match(/Max width:\s+(\d+)px/);
      if (mwMatch) tokens.maxWidth = mwMatch[1] + 'px';

      // Section spacing
      const ssMatch = text.match(/Section spacing:\s+(\d+)px/);
      if (ssMatch) tokens.sectionSpacing = ssMatch[1] + 'px';

      // Vibe
      const vibeMatch = text.match(/\*\*Vibe\*\*:\s+"([^"]+)"/);
      if (vibeMatch) tokens.vibe = vibeMatch[1];

      // Project name
      const nameMatch = text.match(/\*\*Project Name\*\*:\s+(.+)/);
      if (nameMatch) tokens.projectName = nameMatch[1].trim();

      return tokens;
    }

    // Apply tokens to CSS variables
    function applyTokens(tokens) {
      const el = document.getElementById('previewContent');
      const isDark = isColorDark(tokens.bg || '#FFFFFF');

      el.style.setProperty('--p-primary', tokens.primary || '#0071E3');
      el.style.setProperty('--p-secondary', tokens.secondary || '#333');
      el.style.setProperty('--p-bg', tokens.bg || '#FFFFFF');
      el.style.setProperty('--p-surface', tokens.surface || '#F5F5F5');
      el.style.setProperty('--p-text', tokens.text || '#1A1A1A');
      el.style.setProperty('--p-muted', tokens.muted || '#888888');
      el.style.setProperty('--p-accent', tokens.accent || '#FF0000');
      el.style.setProperty('--p-border', tokens.border || '#E0E0E0');
      el.style.setProperty('--p-font', `"${tokens.fontEn || tokens.font || 'Inter'}", "${tokens.font || 'Noto Sans JP'}", sans-serif`);
      el.style.setProperty('--p-h1-size', tokens.h1Size || '48px');
      el.style.setProperty('--p-h2-size', tokens.h2Size || '36px');
      el.style.setProperty('--p-h3-size', tokens.h3Size || '20px');
      el.style.setProperty('--p-h1-weight', tokens.h1Weight || '700');
      el.style.setProperty('--p-h2-weight', tokens.h2Weight || '600');
      el.style.setProperty('--p-btn-radius', tokens.btnRadius || '8px');
      el.style.setProperty('--p-btn-pad', tokens.btnPad || '14px 32px');
      el.style.setProperty('--p-card-radius', tokens.cardRadius || '12px');
      el.style.setProperty('--p-card-pad', tokens.cardPad || '28px');
      el.style.setProperty('--p-nav-h', tokens.navHeight || '64px');

      // Smart hero: dark bg sites get dark hero
      if (isDark) {
        el.style.setProperty('--p-hero-bg', tokens.bg);
        el.style.setProperty('--p-hero-text', tokens.text);
        el.style.setProperty('--p-hero-muted', tokens.muted);
        el.style.setProperty('--p-card-bg', tokens.surface);
        el.style.setProperty('--p-cta-bg', tokens.surface);
        el.style.setProperty('--p-btn-text', isDarkColor(tokens.primary) ? '#FFFFFF' : '#000000');
      } else {
        el.style.setProperty('--p-hero-bg', tokens.bg);
        el.style.setProperty('--p-hero-text', tokens.text);
        el.style.setProperty('--p-hero-muted', tokens.muted);
        el.style.setProperty('--p-card-bg', tokens.bg);
        el.style.setProperty('--p-cta-bg', tokens.surface);
        el.style.setProperty('--p-btn-text', isDarkColor(tokens.primary) ? '#FFFFFF' : '#000000');
      }

      // Browser bar
      document.querySelector('.preview-browser-bar').style.background = isDark ? tokens.surface : '#F0F0F0';
      document.querySelector('.preview-browser-bar').style.borderColor = tokens.border;
      document.querySelector('.pb-url').style.background = isDark ? tokens.bg : '#FFFFFF';
      document.querySelector('.pb-url').style.color = tokens.muted;
    }

    function isColorDark(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 < 128;
    }

    function isDarkColor(hex) {
      if (!hex) return false;
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 < 160;
    }

    // Render sample page
    function renderSample(tokens, name) {
      return `
        <div class="sample">
          <div class="sample-nav">
            <div class="sample-nav-logo">${name}</div>
            <div class="sample-nav-links">
              <span>Features</span>
              <span>Pricing</span>
              <span>Docs</span>
              <span>Blog</span>
            </div>
          </div>

          <div class="sample-hero">
            <div class="sample-hero-label">Introducing ${name}</div>

            <p>A design system that scales with your product. Start with the right foundation.</p>
            <a class="sample-btn">Get Started</a>
            <a class="sample-btn sample-btn-secondary">Learn More</a>
          </div>

          <div class="sample-section sample-section-surface">
            <h2 class="sample-section-title">Everything you need</h2>
            <p class="sample-section-sub">Powerful features, beautifully designed components, and a consistent system.</p>
            <div class="sample-cards">
              <div class="sample-card">
                <div class="sample-card-icon"></div>
                <h3>Color System</h3>
                <p>A carefully crafted palette with semantic color roles and dark mode support.</p>
              </div>
              <div class="sample-card">
                <div class="sample-card-icon"></div>
                <h3>Typography</h3>
                <p>Type scale with responsive sizes, consistent weights, and optimal readability.</p>
              </div>
              <div class="sample-card">
                <div class="sample-card-icon"></div>
                <h3>Components</h3>
                <p>Buttons, cards, inputs, and navigation — all following the design system.</p>
              </div>
            </div>
          </div>

          <div class="sample-section">
            <h2 class="sample-section-title">Trusted by teams worldwide</h2>
            <p class="sample-section-sub">From startups to enterprise, teams rely on consistent design systems.</p>
            <div class="sample-cards">
              <div class="sample-card">
                <div class="sample-card-icon"></div>
                <h3>Fast Setup</h3>
                <p>Copy the design.md file into your project root and start building immediately.</p>
              </div>
              <div class="sample-card">
                <div class="sample-card-icon"></div>
                <h3>Consistent</h3>
                <p>Every component follows the same rules. No more one-off design decisions.</p>

              <div class="sample-card">
                <div class="sample-card-icon"></div>
                <h3>Scalable</h3>
                <p>Works for landing pages, dashboards, mobile apps, and everything in between.</p>

          <div class="sample-cta">
            <h2>Ready to start?</h2>
            <p>Download the design.md template and build your next project.</p>
            <a class="sample-btn">Download Template</a>

          <div class="sample-footer">
            <span>&copy; 2026 ${name}. All rights reserved.</span>

      `;
    }

    // Render side panel
    function renderPanel(tokens) {
      const colorTokens = [
        ['Primary', tokens.primary], ['Secondary', tokens.secondary],
        ['Background', tokens.bg], ['Surface', tokens.surface],
        ['Text', tokens.text], ['Muted', tokens.muted],
        ['Accent', tokens.accent], ['Border', tokens.border]
      ].filter(([,v]) => v);

      const typoTokens = [
        ['Font', tokens.font], ['Font EN', tokens.fontEn],
        ['Base Size', tokens.baseSize], ['Line Height', tokens.lineHeight],
        ['H1', `${tokens.h1Size || '?'} / ${tokens.h1Weight || '?'}`],
        ['H2', `${tokens.h2Size || '?'} / ${tokens.h2Weight || '?'}`],
        ['H3', `${tokens.h3Size || '?'}`]
      ].filter(([,v]) => v && v !== '? / ?');

      const compTokens = [
        ['Button Radius', tokens.btnRadius], ['Button Padding', tokens.btnPad],
        ['Card Radius', tokens.cardRadius], ['Card Padding', tokens.cardPad],
        ['Nav Height', tokens.navHeight], ['Max Width', tokens.maxWidth],
        ['Section Gap', tokens.sectionSpacing]
      ].filter(([,v]) => v);

      document.getElementById('sidePanel').innerHTML = `
        <div class="panel-name">${tokens.projectName || templateId}</div>
        ${tokens.vibe ? `<div class="panel-vibe">${tokens.vibe}</div>` : ''}
        <div class="panel-section">
          <div class="panel-section-title">Colors</div>
          ${colorTokens.map(([l, v]) => `
            <div class="token-row">
              <span class="token-label">${l}</span>
              <span class="token-value">
                <span class="token-swatch" style="background:${v};"></span>
                ${v}
              </span>
            </div>
          `).join('')}
        </div>
        <div class="panel-section">
          <div class="panel-section-title">Typography</div>
          ${typoTokens.map(([l, v]) => `
            <div class="token-row">
              <span class="token-label">${l}</span>
              <span class="token-value">${v}</span>
            </div>
          `).join('')}
        </div>
        <div class="panel-section">
          <div class="panel-section-title">Components & Layout</div>
          ${compTokens.map(([l, v]) => `
            <div class="token-row">
              <span class="token-label">${l}</span>
              <span class="token-value">${v}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    // View switching
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const wrapper = document.getElementById('previewWrapper');
        wrapper.className = 'preview-wrapper ' + btn.dataset.view;
      });
    });

    // Embed mode detection
    if (params.get('embed') === '1') {
      document.body.classList.add('embed-mode');
    }

    // Main init
    async function init() {
      const info = meta[templateId] || { name: templateId, url: 'example.com' };
      document.getElementById('toolbarTitle').textContent = info.name + ' Style Preview';
      document.getElementById('previewUrl').textContent = info.url;
      document.getElementById('downloadBtn').href = `gallery/${templateId}.md`;
      document.getElementById('downloadBtn').setAttribute('download', '');
      document.title = `${info.name} Preview — VibeDesign`;

      try {
        const res = await fetch(`gallery/${templateId}.md`);
        if (!res.ok) throw new Error('Not found');
        const text = await res.text();
        const tokens = parseDesignMd(text);

        applyTokens(tokens);
        document.getElementById('previewContent').innerHTML = renderSample(tokens, info.name);
        renderPanel(tokens);
      } catch (e) {
        document.getElementById('previewContent').innerHTML =
          `<div class="loading">Failed to load template: ${templateId}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
